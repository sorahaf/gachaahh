<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 Budget Planner — Gacha</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;--surface:#151820;--surface2:#1c2030;--border:#2a3045;
  --accent:#7c6af7;--accent2:#f7a26a;--green:#4ade80;--yellow:#fbbf24;
  --red:#f87171;--teal:#2dd4bf;--pink:#f472b6;--blue:#60a5fa;
  --text:#e8eaf0;--muted:#7a839a;
  --font-th:'Noto Sans Thai',sans-serif;--font-mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-th);min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(700px at 15% 30%,rgba(124,106,247,.05),transparent 60%),
             radial-gradient(500px at 85% 70%,rgba(247,162,106,.04),transparent 60%)}
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:1.5rem 1rem 4rem}

.nav{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
.back{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:.4rem .9rem;color:var(--muted);font-family:var(--font-th);font-size:.83rem;
  cursor:pointer;text-decoration:none;transition:border-color .2s}
.back:hover{border-color:var(--accent);color:var(--text)}
.nav h1{font-family:var(--font-mono);font-size:1.05rem;color:var(--accent)}

/* budget input */
.budget-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.25rem}
.budget-box h2{font-size:.8rem;font-family:var(--font-mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.budget-row{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.budget-label{font-size:.9rem;color:var(--muted);white-space:nowrap}
.budget-input{background:var(--surface2);border:2px solid var(--border);border-radius:10px;
  padding:.6rem 1rem;color:var(--text);font-family:var(--font-mono);font-size:1.4rem;
  font-weight:700;width:160px;transition:border-color .2s;text-align:center}
.budget-input:focus{outline:none;border-color:var(--accent)}
.budget-unit{font-size:1.1rem;font-weight:500;color:var(--muted)}
.preset-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.75rem}
.preset{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:.35rem .8rem;font-size:.82rem;color:var(--muted);cursor:pointer;transition:all .2s;font-family:var(--font-mono)}
.preset:hover{border-color:var(--accent);color:var(--text)}
.preset.active{background:rgba(124,106,247,.15);border-color:var(--accent);color:var(--accent)}

/* currency result */
.currency-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.75rem;margin-bottom:1.25rem}
.cur-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem}
.cur-card .top{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.cur-card .ico{font-size:1.3rem}
.cur-card .name{font-size:.8rem;color:var(--muted)}
.cur-card .amount{font-family:var(--font-mono);font-size:1.6rem;font-weight:700;color:var(--accent2)}
.cur-card .sub{font-size:.75rem;color:var(--muted);margin-top:2px}

/* section header */
.sec-head{display:flex;align-items:center;gap:.6rem;margin:1.5rem 0 .75rem}
.sec-head h3{font-size:.78rem;font-family:var(--font-mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.sec-divider{flex:1;height:1px;background:var(--border)}

/* result card */
.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem;margin-bottom:.5rem}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;position:relative;overflow:hidden}
.rcard::before{content:'';position:absolute;inset:0;opacity:.04;pointer-events:none}
.rcard.ticket::before{background:linear-gradient(135deg,#f7a26a,#fbbf24)}
.rcard.heart::before{background:linear-gradient(135deg,#7c6af7,#2dd4bf)}
.rcard.big::before{background:linear-gradient(135deg,#4ade80,#60a5fa)}
.rcard-head{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem}
.rcard-ico{font-size:1.5rem}
.rcard-title{font-size:.92rem;font-weight:500}
.rcard-sub{font-size:.72rem;color:var(--muted)}
.row-item{display:flex;justify-content:space-between;align-items:baseline;
  padding:.4rem 0;border-bottom:1px solid rgba(42,48,69,.6);font-size:.85rem}
.row-item:last-child{border-bottom:none}
.row-item .lbl{color:var(--muted)}
.row-item .val{font-family:var(--font-mono);font-weight:500}
.val.good{color:var(--green)}
.val.warn{color:var(--yellow)}
.val.muted{color:var(--muted)}
.val.accent{color:var(--accent2)}
.val.teal{color:var(--teal)}
.val.blue{color:var(--blue)}

/* highlight box */
.highlight-box{background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.2);
  border-radius:10px;padding:.7rem 1rem;margin-top:.75rem;font-size:.82rem}
.highlight-box .h-row{display:flex;justify-content:space-between;padding:3px 0;font-size:.82rem}
.highlight-box .h-lbl{color:var(--muted)}
.highlight-box .h-val{font-family:var(--font-mono);color:var(--green);font-weight:700}

/* big box pulls display */
.pulls-display{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-top:.4rem}
.pull-bubble{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:3px 10px;font-family:var(--font-mono);font-size:.78rem}
.pull-bubble.full{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.08)}
.pull-bubble.partial{border-color:var(--yellow);color:var(--yellow);background:rgba(251,191,36,.08)}

/* pity tracker within big box */
.pity-bar-wrap{margin-top:.75rem}
.pity-label{font-size:.75rem;color:var(--muted);margin-bottom:.3rem;display:flex;justify-content:space-between}
.pity-bar{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.pity-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--yellow));transition:width .5s ease}

/* note */
.note{background:rgba(124,106,247,.06);border:1px solid rgba(124,106,247,.15);
  border-radius:8px;padding:.65rem 1rem;font-size:.79rem;color:var(--muted);margin-top:1rem;line-height:1.7}
.note strong{color:var(--accent2)}
</style>
</head>
<body>
<div class="wrap">
<div class="nav">
  <a class="back" href="index.html">← กลับ</a>
  <h1>💰 Budget Planner</h1>
</div>

<!-- Budget input -->
<div class="budget-box">
  <h2>💵 งบประมาณของฉัน</h2>
  <div class="budget-row">
    <span class="budget-label">ฉันมีงบ</span>
    <input class="budget-input" type="number" id="budget" value="699" min="0" oninput="calc()">
    <span class="budget-unit">บาท</span>
  </div>
  <div class="preset-row" id="presets"></div>
</div>

<!-- Currency received -->
<div class="currency-row" id="cur-row"></div>

<!-- Ticket box results -->
<div class="sec-head"><h3>🎟️ ถ้าใช้กับตู้ตั๋ว (กราฟฟิตี้)</h3><div class="sec-divider"></div></div>
<div class="result-grid">
  <div class="rcard ticket" id="graffiti-card"></div>
</div>

<!-- Heart box results -->
<div class="sec-head"><h3>💜 ถ้าใช้กับตู้หัวใจ (เรนดรอป)</h3><div class="sec-divider"></div></div>
<div class="result-grid">
  <div class="rcard heart" id="raindrop-card"></div>
</div>

<!-- Big box results -->
<div class="sec-head"><h3>🏛️ ถ้าใช้กับตู้ใหญ่</h3><div class="sec-divider"></div></div>
<div class="result-grid" id="big-cards"></div>

<div class="note">⚠️ เครื่องมือนี้จัดทำขึ้นเพื่อการทดสอบเท่านั้น หากมีข้อผิดพลาดประการใด ต้องขออภัยเป็นอย่างสูง</div>
</div>

<script>
// ══════════════════════════════════════════
// PRICE TABLE (from spreadsheet)
// ══════════════════════════════════════════
const PRICE_TABLE = [
  {baht:15,   hearts:20,   tickets:2},
  {baht:35,   hearts:60,   tickets:6},
  {baht:169,  hearts:320,  tickets:32},
  {baht:369,  hearts:730,  tickets:73},
  {baht:699,  hearts:1370, tickets:137},
  {baht:1060, hearts:2130, tickets:213},
  {baht:1760, hearts:3550, tickets:355},
  {baht:3390, hearts:7050, tickets:705},
];
// 1 ticket = 10 hearts

// ── Buy with budget: greedy best value ──
function buyWithBudget(budget) {
  let remaining = budget;
  let totalHearts = 0, totalTickets = 0, totalSpent = 0;
  const sorted = [...PRICE_TABLE].sort((a,b) => b.baht - a.baht);
  for (const p of sorted) {
    const n = Math.floor(remaining / p.baht);
    if (n > 0) {
      totalHearts  += n * p.hearts;
      totalTickets += n * p.tickets;
      totalSpent   += n * p.baht;
      remaining    -= n * p.baht;
    }
  }
  return {totalHearts, totalTickets, totalSpent, leftover: remaining};
}

// ══════════════════════════════════════════
// BOX GACHA (ticket small box — Graffiti)
// ── 10 draws, no duplicates, 1 Special
// ── tickets per draw: 3,9,15,21,27,33,39,45,45,45
// ══════════════════════════════════════════
const GRAFFITI_COST = [3, 9, 15, 21, 27, 33, 39, 45, 45, 45];
const GRAFFITI_CUMCOST = GRAFFITI_COST.reduce((acc,v,i) => {acc.push((acc[i-1]||0)+v); return acc;}, []);
const GRAFFITI_TOTAL = 10;
const GRAFFITI_RARE_COUNT = 7;   // Special(1) + RareT2(1) + RareT1(5)
const GRAFFITI_NORMAL_COUNT = 3; // NormalT1(2) + NormalT2(1)

// ── P(Special ออก ณ draw k | ยังไม่ได้) จาก Excel ──
// cumulative P(ได้ Special ภายใน k draws) คำนวณจาก marginal per-draw
// marginal draw 1-10 (conditional on not yet obtained):
const GRAFFITI_SPECIAL_MARGINAL = [1.110e-3, 1.110e-3, 1.110e-3, 1.347e-3, 1.664e-3, 1.945e-3, 6.2611e-2, 0.123795, 0.182722, 1.0];
// cumulative P(Special ≥ 1 ภายใน k pulls)
const GRAFFITI_SPECIAL_CUM = (() => {
  let cum = []; let pNot = 1;
  for (const m of GRAFFITI_SPECIAL_MARGINAL) {
    pNot *= (1 - m);
    cum.push(1 - pNot);
  }
  cum[9] = 1.0; // draw 10 การันตี
  return cum;
})();

// P(ได้ rare tier-2 ภายใน k pulls) — marginal จาก Excel
const GRAFFITI_RARET2_MARGINAL = [1.7075e-2, 1.8521e-2, 2.0327e-2, 2.6351e-2, 3.6581e-2, 5.5099e-2, 8.0852e-2, 0.126839, 0.485685, 0];
// P(ได้ rare T1 แต่ละชิ้น ภายใน k pulls) — marginal จาก Excel (5 items, prob เท่ากัน)
const GRAFFITI_RARET1_MARGINAL  = [8.5375e-2, 8.5086e-2, 8.4725e-2, 1.0250e-1, 1.2577e-1, 1.4456e-1, 1.4424e-1, 1.3222e-1, 5.2215e-2, 0];

function graffitiAnalysis(tickets) {
  let pulls = 0;
  let ticketsLeft = tickets;
  for (let i = 0; i < GRAFFITI_COST.length; i++) {
    if (ticketsLeft >= GRAFFITI_COST[i]) { ticketsLeft -= GRAFFITI_COST[i]; pulls++; }
    else break;
  }
  const nextCost = pulls < GRAFFITI_COST.length ? GRAFFITI_COST[pulls] : null;

  // P(ได้ Special) — ใช้ cumulative จาก Excel table
  const probSpecial = pulls === 0 ? 0 : GRAFFITI_SPECIAL_CUM[Math.min(pulls - 1, 9)];

  // E[Rare ที่ได้] — คิดจาก P(ออกอย่างน้อย 1 ครั้ง) ของแต่ละ tier สะสม
  // Special: 1 ชิ้น × P(ได้)
  // RareT2: 1 ชิ้น × P(ได้ภายใน k pulls)
  // RareT1: 5 ชิ้น × P(ได้แต่ละชิ้น) — แต่ละชิ้น independent (no-dup)
  let pNotRareT2 = 1;
  for (let i = 0; i < pulls && i < 10; i++) pNotRareT2 *= (1 - GRAFFITI_RARET2_MARGINAL[i]);
  const pRareT2 = Math.min(1, 1 - pNotRareT2);

  let pNotRareT1each = 1;
  for (let i = 0; i < pulls && i < 10; i++) pNotRareT1each *= (1 - GRAFFITI_RARET1_MARGINAL[i]);
  const pRareT1each = Math.min(1, 1 - pNotRareT1each);

  const expectedRare = pulls >= GRAFFITI_TOTAL
    ? GRAFFITI_RARE_COUNT
    : probSpecial * 1 + pRareT2 * 1 + pRareT1each * 5;

  // E[Normal] = draws - E[Rare drawn] (แต่ละ pull ได้ 1 ชิ้นเสมอ)
  // ถ้า Special ออก → ได้ทุกชิ้นทันที ดังนั้น E[Normal] ≤ GRAFFITI_NORMAL_COUNT
  const expectedNormal = pulls >= GRAFFITI_TOTAL
    ? GRAFFITI_NORMAL_COUNT
    : Math.min(GRAFFITI_NORMAL_COUNT, Math.max(0, pulls - (probSpecial + pRareT2 + pRareT1each * 5)));

  return {pulls, probSpecial, expectedRare, expectedNormal, nextCost, ticketsLeft};
}

// ══════════════════════════════════════════
// BOX GACHA (heart small box — Raindrop)
// ── 12 draws, no duplicates
// ── hearts per draw: 30,60,90,120,150,190,230,270,310,350,390,430
// ══════════════════════════════════════════
const RAINDROP_COST = [30, 60, 90, 120, 150, 190, 230, 270, 310, 350, 390, 430];
const RAINDROP_TOTAL = 12;
const RAINDROP_CUMCOST = RAINDROP_COST.reduce((acc,v,i)=>{acc.push((acc[i-1]||0)+v);return acc;},[]);
const RAINDROP_PREMIUM_COUNT = 8; // Special(1)+T2(1)+T1a(3)+T1b(3)
const RAINDROP_NORMAL_COUNT  = 4; // T1(3)+T2(1)

// Marginal P(Special ณ draw k) จาก Excel
const RAINDROP_SPECIAL_MARGINAL = [1.110e-3, 1.110e-3, 1.110e-3, 1.110e-3, 1.144e-3, 1.221e-3, 2.0799e-2, 4.3406e-2, 7.0248e-2, 0.102297, 0.139814, 1.0];
const RAINDROP_SPECIAL_CUM = (() => {
  let cum = []; let pNot = 1;
  for (const m of RAINDROP_SPECIAL_MARGINAL) {
    pNot *= (1 - m);
    cum.push(1 - pNot);
  }
  cum[11] = 1.0;
  return cum;
})();

const RAINDROP_PREMIUMT2_MARGINAL  = [1.2064e-2, 1.3399e-2, 1.5112e-2, 1.7415e-2, 2.1092e-2, 2.7544e-2, 4.5336e-2, 7.4076e-2, 0.106974, 0.147208, 0.429007, 0];
const RAINDROP_PREMIUMT1a_MARGINAL = [6.0319e-2, 6.3652e-2, 6.7643e-2, 7.2538e-2, 8.0379e-2, 9.2210e-2, 0.103648, 0.113685, 0.121984, 0.127335, 5.2763e-2, 0];
const RAINDROP_PREMIUMT1b_MARGINAL = [0.120639,  0.116861,  0.112299,  0.106636,  0.103332,  0.102152,  9.7895e-2, 8.8650e-2, 7.1680e-2, 4.5682e-2, 1.1440e-2, 0];

function raindropAnalysis(hearts) {
  let pulls = 0;
  let heartsLeft = hearts;
  for (let i = 0; i < RAINDROP_COST.length; i++) {
    if (heartsLeft >= RAINDROP_COST[i]) { heartsLeft -= RAINDROP_COST[i]; pulls++; }
    else break;
  }
  const nextCost = pulls < RAINDROP_COST.length ? RAINDROP_COST[pulls] : null;

  const probSpecial = pulls === 0 ? 0 : RAINDROP_SPECIAL_CUM[Math.min(pulls - 1, 11)];

  let pNotT2 = 1;
  for (let i = 0; i < pulls && i < 12; i++) pNotT2 *= (1 - RAINDROP_PREMIUMT2_MARGINAL[i]);
  const pT2 = Math.min(1, 1 - pNotT2);

  let pNotT1a = 1;
  for (let i = 0; i < pulls && i < 12; i++) pNotT1a *= (1 - RAINDROP_PREMIUMT1a_MARGINAL[i]);
  const pT1aEach = Math.min(1, 1 - pNotT1a);

  let pNotT1b = 1;
  for (let i = 0; i < pulls && i < 12; i++) pNotT1b *= (1 - RAINDROP_PREMIUMT1b_MARGINAL[i]);
  const pT1bEach = Math.min(1, 1 - pNotT1b);

  const expectedPremium = pulls >= RAINDROP_TOTAL
    ? RAINDROP_PREMIUM_COUNT
    : probSpecial * 1 + pT2 * 1 + pT1aEach * 3 + pT1bEach * 3;

  const expectedNormal = pulls >= RAINDROP_TOTAL
    ? RAINDROP_NORMAL_COUNT
    : Math.min(RAINDROP_NORMAL_COUNT, Math.max(0, pulls - (probSpecial + pT2 + pT1aEach * 3 + pT1bEach * 3)));

  return {pulls, probSpecial, expectedPremium, expectedNormal, nextCost, heartsLeft};
}

// ══════════════════════════════════════════
// BIG BOX GACHA (standard gacha)
// ── costume: Rare 5%, guarantee 10 first / every 25 after
// ── furniture: Rare 4.3%, same guarantee
// ── 6 tickets per pull
// ══════════════════════════════════════════
const BIG_TICKET_COST = 6; // tickets per pull
const BIG_BOXES = [
  {id:'girl',  name:'ตู้ใหญ่ชุดผู้หญิง', icon:'👗', rareRate:0.05,  rareCount:11, rainbowCount:5, goldCount:6,  guarantee1:10, guarantee2:25, color:'accent2'},
  {id:'boy',   name:'ตู้ใหญ่ชุดผู้ชาย',  icon:'👔', rareRate:0.05,  rareCount:11, rainbowCount:5, goldCount:6,  guarantee1:10, guarantee2:25, color:'blue'},
  {id:'house', name:'ตู้ใหญ่บ้าน',        icon:'🏠', rareRate:0.043, rareCount:15, rainbowCount:8, goldCount:7,  guarantee1:10, guarantee2:25, color:'teal'},
];

function bigBoxAnalysis(tickets, box) {
  const totalPulls = Math.floor(tickets / BIG_TICKET_COST);
  if (totalPulls === 0) return null;

  const rounds10 = Math.floor(totalPulls / 10);
  const extraPulls = totalPulls % 10;
  const ticketsUsed = totalPulls * BIG_TICKET_COST;
  const ticketsLeft = tickets - ticketsUsed;

  // ── คำนวณ expectedRare โดยจำลอง pity แบบถูกต้อง ──
  // Pity rule:
  //   - 10 pull แรก: การันตี Rare ≥ 1
  //   - หลังจากนั้น: การันตีทุก 25 pull
  //   - ออก Rare ใหม่ (ไม่ซ้ำ) → pity รีเซ็ต
  //   - ออก Rare ซ้ำ → pity นับต่อ
  // สูตร E[Rare ใน N pull] คำนวณต่อช่วง pity:
  //   ช่วงแรก (10 pull): E[natural] = 10*rate, guaranteed ≥ 1 → E = max(10*rate, 1) ≈ 1 (rate=5%)
  //   ช่วงถัดไป (25 pull each): E[natural] = 25*rate = 1.25, guaranteed ≥ 1 → E ≈ 1.25
  // แต่ Rare ซ้ำทำให้ pity ไม่รีเซ็ต → ช่วง pity จริงๆ สั้นลงถ้าโชคดี ยาวขึ้นถ้าซ้ำ
  // ใช้ E[Rare] = pulls * rareRate (natural) + pity guarantee (lower bound)
  const expectedRareNatural = totalPulls * box.rareRate;
  // pity guarantee: อย่างน้อย 1 ใน 10 pull แรก + 1 ทุก 25 pull หลังจากนั้น
  const guaranteeFloor = totalPulls >= box.guarantee1
    ? 1 + Math.floor((totalPulls - box.guarantee1) / box.guarantee2)
    : 0;
  // E[Rare] จริงๆ อยู่ระหว่าง natural กับ guarantee (pity ซ้ำทำให้ใกล้ natural มากกว่า)
  // ใช้ค่าเฉลี่ยถ่วงน้ำหนัก: ถ้า natural > guarantee ใช้ natural, ถ้าต่ำกว่าใช้ guarantee
  const expectedRare = Math.max(expectedRareNatural, guaranteeFloor);

  // ── unique Rare ที่คาดว่าได้ (Coupon Collector) ──
  // E[unique จาก N draws กับ K items] = K * (1 - ((K-1)/K)^N)
  const K = box.rareCount;
  const expectedUniqueRare = K * (1 - Math.pow((K - 1) / K, Math.round(expectedRare)));

  // Rainbow vs Gold split (จาก unique rare ที่ได้)
  const rainbowFrac = box.rainbowCount / box.rareCount;
  const goldFrac    = box.goldCount    / box.rareCount;
  const expectedRainbow = expectedUniqueRare * rainbowFrac;
  const expectedGold    = expectedUniqueRare * goldFrac;

  // P(ได้ rainbow ≥ 1) จาก pull perspective
  const rainbowPerPull = box.rareRate * rainbowFrac;
  const probRainbowFromPulls = 1 - Math.pow(1 - rainbowPerPull, totalPulls);

  // pity guarantee info
  const pityAfter10 = totalPulls >= box.guarantee1
    ? Math.floor((totalPulls - box.guarantee1) / box.guarantee2)
    : 0;

  // worst case pulls ถึงการันตี rainbow (gold ทั้งหมดออกก่อน + ซ้ำทุกครั้ง)
  // worst: pity ไม่รีเซ็ต (ซ้ำหมด) จนกว่าจะออก rainbow → guarantee2 * goldCount + guarantee1
  const pullsToGuarRainbow = box.guarantee1 + box.goldCount * box.guarantee2;

  return {totalPulls, rounds10, extraPulls, ticketsUsed, ticketsLeft,
    expectedRare, expectedUniqueRare, expectedRainbow, expectedGold,
    probRainbowFromPulls, pullsToGuarRainbow,
    pityAfter10, guaranteeFloor};
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
const PRESETS = [15, 35, 169, 369, 699, 1060, 1760, 3390];

function fmt(n, dec=0) {
  return Number(n).toLocaleString('th-TH', {
    minimumFractionDigits: dec,
    maximumFractionDigits: dec
  });
}
function pct(p) { return (p*100).toFixed(1)+'%'; }

function row(lbl, val, cls='') {
  return `<div class="row-item"><span class="lbl">${lbl}</span><span class="val ${cls}">${val}</span></div>`;
}

function calc() {
  const budget = parseFloat(document.getElementById('budget').value) || 0;

  // presets
  document.querySelectorAll('.preset').forEach(p => {
    p.classList.toggle('active', +p.dataset.v === budget);
  });

  const {totalHearts, totalTickets, totalSpent, leftover} = buyWithBudget(budget);

  // currency cards
  document.getElementById('cur-row').innerHTML = `
    <div class="cur-card">
      <div class="top"><span class="ico">💰</span><span class="name">งบที่ใช้ได้</span></div>
      <div class="amount">฿${fmt(totalSpent)}</div>
      <div class="sub">${leftover > 0 ? `เงินเหลือ ฿${fmt(leftover)}` : 'ใช้งบครบพอดี'}</div>
    </div>
    <div class="cur-card">
      <div class="top"><span class="ico">💜</span><span class="name">หัวใจที่ได้รับ</span></div>
      <div class="amount" style="color:var(--teal)">${fmt(totalHearts)}</div>
      <div class="sub">≈ ${(totalTickets).toFixed(0)} ตั๋ว (1 ตั๋ว = 10 ใจ)</div>
    </div>
    <div class="cur-card">
      <div class="top"><span class="ico">🎟️</span><span class="name">ตั๋วที่ได้รับ</span></div>
      <div class="amount">${totalTickets.toFixed(2)}</div>
      <div class="sub">≈ ${fmt(totalHearts)} หัวใจ</div>
    </div>
  `;

  // Graffiti
  const g = graffitiAnalysis(totalTickets);
  document.getElementById('graffiti-card').innerHTML = `
    <div class="rcard-head">
      <span class="rcard-ico">🎨</span>
      <div><div class="rcard-title">กราฟฟิตี้ (ตู้ตั๋วเล็ก)</div>
      <div class="rcard-sub">Box Gacha 10 ช่อง · ไม่มีของซ้ำ</div></div>
    </div>
    ${row('เปิดได้', `${g.pulls} ครั้ง / 10 ครั้ง`, g.pulls >= 10 ? 'good' : 'accent')}
    ${row('โอกาสได้ของใหญ่ (Special)', pct(g.probSpecial), g.probSpecial >= 1 ? 'good' : g.probSpecial >= 0.5 ? 'warn' : 'muted')}
    ${row('คาดว่าได้ Rare Treasure', `~${fmt(g.expectedRare,1)} ชิ้น`, 'accent')}
    ${row('คาดว่าได้ Normal Treasure', `~${fmt(g.expectedNormal,1)} ชิ้น`, 'muted')}
    ${g.pulls >= 10
      ? `<div class="highlight-box">
          <div class="h-row"><span class="h-lbl">🏆 ครบทุกช่อง!</span><span class="h-val">ได้ของทั้งหมด 10 ชิ้น</span></div>
          <div class="h-row"><span class="h-lbl">ตั๋วเหลือ</span><span class="h-val">${g.ticketsLeft.toFixed(2)} ตั๋ว</span></div>
         </div>`
      : g.nextCost ? `<div style="margin-top:.6rem;font-size:.78rem;color:var(--muted)">ขาดอีก <strong style="color:var(--yellow)">${(g.nextCost - (totalTickets - GRAFFITI_CUMCOST[g.pulls-1]||0)).toFixed(1)} ตั๋ว</strong> ถึงจะเปิดครั้งที่ ${g.pulls+1}</div>` : ''}
  `;

  // Raindrop
  const r = raindropAnalysis(totalHearts);
  document.getElementById('raindrop-card').innerHTML = `
    <div class="rcard-head">
      <span class="rcard-ico">🌧️</span>
      <div><div class="rcard-title">เรนดรอป (ตู้หัวใจเล็ก)</div>
      <div class="rcard-sub">Box Gacha 12 ช่อง · ไม่มีของซ้ำ</div></div>
    </div>
    ${row('เปิดได้', `${r.pulls} ครั้ง / 12 ครั้ง`, r.pulls >= 12 ? 'good' : 'accent')}
    ${row('โอกาสได้ของใหญ่ (Special)', pct(r.probSpecial), r.probSpecial >= 1 ? 'good' : r.probSpecial >= 0.5 ? 'warn' : 'muted')}
    ${row('คาดว่าได้ Moonlight Premium (ทอง)', `~${fmt(r.expectedPremium,1)} ชิ้น`, 'teal')}
    ${row('คาดว่าได้ Normal Treasure', `~${fmt(r.expectedNormal,1)} ชิ้น`, 'muted')}
    ${r.pulls >= 12
      ? `<div class="highlight-box">
          <div class="h-row"><span class="h-lbl">🏆 ครบทุกช่อง!</span><span class="h-val">ได้ของทั้งหมด 12 ชิ้น</span></div>
          <div class="h-row"><span class="h-lbl">ใจเหลือ</span><span class="h-val">${r.heartsLeft} ใจ</span></div>
         </div>`
      : r.nextCost ? `<div style="margin-top:.6rem;font-size:.78rem;color:var(--muted)">ขาดอีก <strong style="color:var(--yellow)">${r.nextCost - (totalHearts - [30,90,180,300,450,640,870,1140,1450,1800,2190][r.pulls-1]||0)} ใจ</strong> ถึงจะเปิดครั้งที่ ${r.pulls+1}</div>` : ''}
  `;

  // Big boxes
  document.getElementById('big-cards').innerHTML = BIG_BOXES.map(box => {
    const b = bigBoxAnalysis(totalTickets, box);
    if (!b) return `<div class="rcard big">
      <div class="rcard-head"><span class="rcard-ico">${box.icon}</span>
      <div><div class="rcard-title">${box.name}</div><div class="rcard-sub">ต้องการ ${BIG_TICKET_COST} ตั๋ว/ครั้ง</div></div></div>
      <div style="color:var(--muted);font-size:.85rem;margin-top:.5rem">ตั๋วไม่พอแม้แต่ 1 pull (ต้องการ ${BIG_TICKET_COST} ตั๋ว)</div>
    </div>`;

    const pullsDisplay = b.rounds10 > 0
      ? `<div class="pulls-display">
          ${Array(b.rounds10).fill(0).map((_,i) => `<span class="pull-bubble full">10 pull</span>`).join('')}
          ${b.extraPulls > 0 ? `<span class="pull-bubble partial">${b.extraPulls} pull</span>` : ''}
         </div>`
      : `<div class="pulls-display"><span class="pull-bubble partial">${b.totalPulls} pull</span></div>`;

    return `<div class="rcard big">
      <div class="rcard-head"><span class="rcard-ico">${box.icon}</span>
      <div><div class="rcard-title">${box.name}</div>
      <div class="rcard-sub">Rare ${(box.rareRate*100).toFixed(1)}% · ${BIG_TICKET_COST} ตั๋ว/pull · รุ้ง ${box.rainbowCount} / ทอง ${box.goldCount} ชิ้น</div></div></div>

      ${row('เปิดได้', `${b.totalPulls} pull`, 'accent')}
      <div style="margin:.3rem 0 .6rem">${pullsDisplay}</div>

      ${row('การันตี Rare ครั้งแรก', b.totalPulls >= box.guarantee1 ? `✓ pull ที่ ${box.guarantee1}` : `ยังไม่ถึง (ต้องการ ${box.guarantee1} pull)`, b.totalPulls >= box.guarantee1 ? 'good' : 'muted')}
      ${b.pityAfter10 > 0 ? row('การันตีจากปิตี้ (ทุก 25 pull)', `+${b.pityAfter10} ครั้ง`, 'good') : ''}
      ${row('คาดได้ Rare ทั้งหมด', `~${fmt(b.expectedRare,1)} ครั้ง`, 'accent')}
      ${row('คาดได้ Rare ไม่ซ้ำ', `~${fmt(b.expectedUniqueRare,1)} / ${b.totalPulls >= 0 ? box.rareCount : '?'} ชิ้น`, b.expectedUniqueRare >= box.rareCount * 0.8 ? 'good' : 'warn')}

      <div style="background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.2);border-radius:10px;padding:.7rem .9rem;margin:.6rem 0">
        <div style="font-size:.72rem;color:var(--green);font-family:var(--font-mono);letter-spacing:.05em;margin-bottom:.5rem">🌈 RAINBOW RARE — ของที่อยากได้มากสุด</div>
        <div class="row-item" style="border-color:rgba(74,222,128,.15)"><span class="lbl">คาดได้รุ้ง</span><span class="val good">~${fmt(b.expectedRainbow,1)} ชิ้น</span></div>
        <div class="row-item" style="border-color:rgba(74,222,128,.15)"><span class="lbl">โอกาสได้รุ้ง ≥ 1 ชิ้น</span><span class="val" style="color:${b.probRainbowFromPulls>=0.9?'var(--green)':b.probRainbowFromPulls>=0.5?'var(--yellow)':'var(--red)'}; font-family:var(--font-mono)">${pct(b.probRainbowFromPulls)}</span></div>
        <div class="row-item" style="border-bottom:none"><span class="lbl" style="font-size:.75rem">ต้องการ ${b.pullsToGuarRainbow} pull ถึงการันตีรุ้ง (worst case)</span><span class="val muted">${b.totalPulls >= b.pullsToGuarRainbow ? '✓ ถึงแล้ว' : `ขาด ${b.pullsToGuarRainbow - b.totalPulls} pull`}</span></div>
        <div class="pity-bar" style="margin-top:.5rem"><div class="pity-fill" style="width:${Math.min(100,b.probRainbowFromPulls*100).toFixed(1)}%;background:linear-gradient(90deg,var(--green),var(--teal))"></div></div>
      </div>

      ${row('คาดได้ 🥇 ทอง', `~${fmt(b.expectedGold,1)} ชิ้น`, 'warn')}
      ${b.ticketsLeft > 0 ? row('ตั๋วเหลือ', `${b.ticketsLeft.toFixed(1)} ตั๋ว`, 'muted') : ''}
    </div>`;
  }).join('');
}

// build presets
const presetsEl = document.getElementById('presets');
PRESETS.forEach(v => {
  const b = document.createElement('button');
  b.className = 'preset';
  b.dataset.v = v;
  b.textContent = '฿'+v.toLocaleString();
  b.onclick = () => { document.getElementById('budget').value = v; calc(); };
  presetsEl.appendChild(b);
});

calc();
</script>

</html>
