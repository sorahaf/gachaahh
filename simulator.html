<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 Gacha Simulator (Excel Rate & Debug Chance)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f14; --surface:#151820; --surface2:#1c2030; --border:#2a3045;
  --accent:#7c6af7; --accent2:#f7a26a; --green:#4ade80; --yellow:#fbbf24;
  --orange:#f97316; --red:#f87171; --teal:#2dd4bf; --pink:#f472b6;
  --text:#e8eaf0; --muted:#7a839a;
  --font-th:'Noto Sans Thai',sans-serif; --font-mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-th);min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(800px at 20% 30%,rgba(124,106,247,.05),transparent 10%),
             radial-gradient(600px at 80% 70%,rgba(247,162,106,.04),transparent 10%)}

.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem}
.nav{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
.back{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:.4rem .9rem;color:var(--muted);font-size:.83rem;
  cursor:pointer;text-decoration:none;transition:border-color .2s}
.back:hover{border-color:var(--accent);color:var(--text)}
.nav h1{font-family:var(--font-mono);font-size:1.1rem;color:var(--accent)}

.box-sel{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;margin-bottom:1.5rem}
.box-btn{background:var(--surface);border:2px solid var(--border);border-radius:12px;
  padding:1rem .7rem;text-align:center;cursor:pointer;transition:all .2s}
.box-btn:hover{border-color:var(--accent)}
.box-btn.active{border-color:var(--accent);background:rgba(124,106,247,.08)}
.box-btn .ico{font-size:1.8rem;margin-bottom:.3rem}
.box-btn .nm{font-size:.85rem;font-weight:500}
.box-btn .sub{font-size:.72rem;color:var(--muted);margin-top:2px}

.info-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.6rem;margin-bottom:1.25rem}
.info-chip{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:.7rem 1rem;text-align:center}
.info-chip .v{font-family:var(--font-mono);font-size:1.25rem;font-weight:700;color:var(--accent)}
.info-chip .l{font-size:.72rem;color:var(--muted);margin-top:1px}
.info-chip.warn .v{color:var(--yellow)}
.info-chip.good .v{color:var(--green)}

.pull-area{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.pull-btn{flex:1;min-width:140px;padding:.8rem 1.2rem;border:none;border-radius:12px;
  font-family:var(--font-th);font-size:.95rem;font-weight:700;cursor:pointer;
  transition:all .15s;position:relative;overflow:hidden}
.pull-btn:active{transform:scale(.97)}
.pull1{background:linear-gradient(135deg,#3d5af1,#7c6af7);color:#fff}
.pull10{background:linear-gradient(135deg,#c55a11,#f7a26a);color:#fff}
.reset-pull{flex:0 0 auto;min-width:auto;background:var(--surface);border:1px solid var(--border);
  color:var(--muted)}
.reset-pull:hover{border-color:var(--red);color:var(--red)}
.pull-btn:disabled{opacity:.4;cursor:not-allowed}
.cost-tag{font-size:.73rem;opacity:.85;margin-top:2px;display:block}

.stage{min-height:200px;background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:1.25rem;margin-bottom:1.25rem;position:relative;overflow:hidden}
.stage-empty{display:flex;align-items:center;justify-content:center;height:160px;
  color:var(--muted);font-size:.9rem}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:.6rem}
.item-card{border-radius:10px;padding:.5rem .3rem;text-align:center;
  animation:popIn .25s ease both;position:relative;display:flex;flex-direction:column;justify-content:space-between;min-height:135px}
.item-card.rare{background:linear-gradient(135deg,rgba(247,162,106,.2),rgba(251,191,36,.15));
  border:1px solid rgba(247,162,106,.4)}
.item-card.common{background:var(--surface2);border:1px solid var(--border)}
.item-card img{width:54px;height:54px;object-fit:contain;border-radius:8px;display:block;margin:0 auto .3rem}
.item-card .img-placeholder{width:54px;height:54px;border-radius:8px;display:flex;
  align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto .3rem}
.item-card.rare .img-placeholder{background:rgba(247,162,106,.15)}
.item-card.common .img-placeholder{background:rgba(124,106,247,.1)}
.item-card .iname{font-size:.65rem;color:var(--text);line-height:1.2;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex-grow:1}
.item-card .rare-star{position:absolute;top:4px;right:4px;font-size:.65rem;color:var(--yellow)}

.debug-chance{font-family:var(--font-mono);font-size:.65rem;padding:1px 4px;border-radius:4px;
  background:rgba(0,0,0,0.4);color:var(--teal);margin-top:auto;display:inline-block;font-weight:700}
.item-card.rare .debug-chance{color:var(--yellow)}

@keyframes popIn{from{transform:scale(.5) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

.pull-anim{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--surface);z-index:10;border-radius:16px}
.pull-anim.hidden{display:none}
.anim-card{width:160px;height:200px;border-radius:16px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:.5rem;animation:revealCard .5s ease;padding:1rem}
.anim-card.rare{background:linear-gradient(135deg,#f7a26a33,#fbbf2422);border:2px solid var(--yellow)}
.anim-card.common{background:var(--surface2);border:2px solid var(--border)}
.anim-card img{width:72px;height:72px;object-fit:contain}
.anim-card .anim-placeholder{width:72px;height:72px;border-radius:12px;display:flex;
  align-items:center;justify-content:center;font-size:2.5rem}
.anim-card .anim-name{font-size:.8rem;text-align:center;padding:0 .4rem}
.anim-card .anim-type{font-size:.7rem;color:var(--muted)}
.anim-card .anim-chance{font-family:var(--font-mono);font-size:.75rem;color:var(--teal);background:rgba(0,0,0,0.4);padding:2px 6px;border-radius:4px;margin-top:4px}
@keyframes revealCard{from{transform:rotateY(90deg) scale(.8);opacity:0}to{transform:rotateY(0) scale(1);opacity:1}}

.bonus-toast{position:fixed;top:1.5rem;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#fbbf24,#f7a26a);color:#1a1000;
  padding:.6rem 1.4rem;border-radius:30px;font-weight:700;font-size:.9rem;
  z-index:100;animation:toastIn .4s ease;box-shadow:0 4px 20px rgba(251,191,36,.4)}
.bonus-toast.hidden{display:none}
@keyframes toastIn{from{top:-.5rem;opacity:0}to{top:1.5rem;opacity:1}}

.img-manager{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.img-manager summary{cursor:pointer;font-size:.85rem;color:var(--muted);font-family:var(--font-mono);letter-spacing:.05em;text-transform:uppercase}
.img-manager summary:hover{color:var(--text)}
.img-tabs{display:flex;gap:4px;margin:1rem 0 .75rem}
.img-tab{padding:.35rem .8rem;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;font-family:var(--font-th)}
.img-tab.active{background:var(--surface2);color:var(--text);border-color:var(--accent)}
.item-img-row{display:flex;align-items:center;gap:.7rem;padding:.5rem 0;border-bottom:1px solid rgba(42,48,69,.5)}
.item-img-row:last-child{border-bottom:none}
.item-img-preview{width:40px;height:40px;border-radius:8px;object-fit:contain;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.item-img-name{flex:1;font-size:.83rem}
.item-img-input{flex:2;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  padding:.3rem .6rem;color:var(--text);font-size:.78rem;font-family:var(--font-mono)}
.item-img-input:focus{outline:none;border-color:var(--accent)}

.history-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem}
.history-bar summary{cursor:pointer;font-size:.83rem;color:var(--muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.05em}
.hist-row{display:flex;flex-direction:column;gap:.4rem;margin-top:.75rem;max-height:280px;overflow-y:auto}
.hist-item{display:flex;justify-content:space-between;align-items:center;background:var(--surface2);padding:6px 12px;border-radius:8px;border:1px solid var(--border);font-size:.8rem}
.hist-left{display:flex;align-items:center;gap:8px}
.hist-pill{padding:2px 8px;border-radius:12px;font-size:.72rem;font-family:var(--font-mono);font-weight:bold}
.hist-pill.rare{background:rgba(247,162,106,.15);color:var(--accent2)}
.hist-pill.common{background:rgba(255,255,255,0.05);color:var(--muted)}
.hist-pill.bonus{background:rgba(251,191,36,.2);color:var(--yellow)}
.hist-chance{font-family:var(--font-mono);font-size:.75rem;color:var(--teal);font-weight:700}

.sub-btn{padding:.4rem .9rem;border:1px solid var(--border);border-radius:20px;background:var(--surface);
  color:var(--muted);font-size:.8rem;cursor:pointer;font-family:var(--font-th);transition:all .2s}
.sub-btn:hover{border-color:var(--accent);color:var(--text)}
.sub-btn.active{background:rgba(124,106,247,.12);border-color:var(--accent);color:var(--text);font-weight:600}

@media(max-width:500px){
  .box-sel{grid-template-columns:1fr 1fr}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(85px,1fr))}
}

</head>

// ══════════════════════════════════════════
// STATE MANAGEMENT
// ══════════════════════════════════════════
let state = loadState();
let currentBox = 'big';
let currentSubBox = { big: 'female', graffiti: 'female', raindrop: 'limpid' };
let images = JSON.parse(localStorage.getItem('gacha_images') || '{}');

function freshState() {
  return {
    big: {
      female: { pulls: 0, pullsSinceRare: 0, totalCurrency: 0, bonusEarned: [], history: [], gotRares: [], gotFirstRare: false, gotAll: false },
      male: { pulls: 0, pullsSinceRare: 0, totalCurrency: 0, bonusEarned: [], history: [], gotRares: [], gotFirstRare: false, gotAll: false },
      house: { pulls: 0, pullsSinceRare: 0, totalCurrency: 0, bonusEarned: [], history: [], gotRares: [], gotFirstRare: false, gotAll: false }
    },
    graffiti: {
      female: { pulls: 0, totalCurrency: 0, history: [], gotAll: false, pool: null },
      male: { pulls: 0, totalCurrency: 0, history: [], gotAll: false, pool: null }
    },
    raindrop: {
      limpid: { pulls: 0, totalCurrency: 0, history: [], gotAll: false, pool: null },
      drift: { pulls: 0, totalCurrency: 0, history: [], gotAll: false, pool: null }
    }
  };
}

function loadState() {
  try {
    let saved = localStorage.getItem('gacha_sim_state_v3');
    return saved ? JSON.parse(saved) : freshState();
  } catch(e) { return freshState(); }
}

function saveState() {
  localStorage.setItem('gacha_sim_state_v3', JSON.stringify(state));
}

function getSubState() {
  return state[currentBox][currentSubBox[currentBox]];
}

// ══════════════════════════════════════════
// UI CONTROL & LOGIC
// ══════════════════════════════════════════
function selectBox(id, el) {
  currentBox = id;
  document.querySelectorAll('.box-sel .box-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderSubBoxSel();
  renderInfoBar();
  renderStageEmpty();
  renderHistory();
  updateCostTags();
}

function selectSubBox(sub) {
  currentSubBox[currentBox] = sub;
  document.querySelectorAll('.sub-btn').forEach(b => b.classList.toggle('active', b.dataset.sub === sub));
  renderInfoBar();
  renderStageEmpty();
  renderHistory();
  updateCostTags();
  renderImgList();
}

function renderSubBoxSel() {
  const el = document.getElementById('sub-box-sel');
  let subData = currentBox === 'big' ? BIG_SUB_BOXES : BOXES[currentBox].subBoxes;
  el.innerHTML = Object.entries(subData).map(([key, s]) =>
    `<button class="sub-btn ${currentSubBox[currentBox]===key?'active':''}" data-sub="${key}" onclick="selectSubBox('${key}')">${s.label}</button>`
  ).join('');
}

function getCostForPull(boxId, pullNum) {
  if (boxId === 'big') return BOXES.big.costPerPull;
  if (boxId === 'graffiti') return BOXES.graffiti.ticketsPerPull[Math.min(pullNum-1, 9)];
  if (boxId === 'raindrop') return BOXES.raindrop.heartsPerPull[Math.min(pullNum-1, 11)];
  return 0;
}

function updateCostTags() {
  const st = getSubState();
  document.getElementById('cost1').textContent = `${getCostForPull(currentBox, st.pulls + 1)} ${BOXES[currentBox].currency}`;
  const btn10 = document.getElementById('btn10');
  if (currentBox === 'big') {
    btn10.style.display = '';
    document.getElementById('cost10').textContent = `${BOXES.big.costPerPull * 10} ตั๋ว`;
  } else {
    btn10.style.display = 'none';
  }
}

function renderInfoBar() {
  const st = getSubState();
  const box = BOXES[currentBox];
  let chips = [];

  let nameLabel = currentBox === 'big' ? BIG_SUB_BOXES[currentSubBox.big].name : box.subBoxes[currentSubBox[currentBox]].name;
  chips.push(`<div class="info-chip" style="grid-column:1/-1"><div class="v" style="font-size:.8rem;color:var(--muted)">${nameLabel}</div></div>`);
  chips.push(`<div class="info-chip"><div class="v">${st.pulls}</div><div class="l">Pull สะสม</div></div>`);
  chips.push(`<div class="info-chip"><div class="v">${Number(st.totalCurrency).toLocaleString()}</div><div class="l">${box.currency}ที่ใช้</div></div>`);

  if (currentBox === 'big') {
    const limit = st.gotFirstRare ? box.guarantee2 : box.guarantee1;
    const remains = Math.max(0, limit - st.pullsSinceRare);
    chips.push(`<div class="info-chip ${remains<=5?'warn':''}"><div class="v">${st.pullsSinceRare}</div><div class="l">Pity เกจ (การันตีชิ้นใหม่ใน ${remains})</div></div>`);
    const totalRares = BIG_SUB_BOXES[currentSubBox.big].items.rare.length;
    chips.push(`<div class="info-chip good"><div class="v">${st.gotRares.length}/${totalRares}</div><div class="l">Rare ชิ้นไม่ซ้ำที่ได้</div></div>`);
  } else {
    const maxP = box.maxDraws;
    chips.push(`<div class="info-chip ${(maxP - st.pulls)<=2?'warn':''}"><div class="v">${Math.max(0, maxP - st.pulls)}</div><div class="l">เหลือการันตีล้างตู้</div></div>`);
  }

  if (st.gotAll) {
    chips.push(`<div class="info-chip good" style="grid-column:1/-1;border-color:var(--green);background:rgba(74,222,128,0.06)"><div class="v" style="color:var(--green)">🎉 ล้างตู้สำเร็จแล้ว!</div></div>`);
  }
  document.getElementById('info-bar').innerHTML = chips.join('');
}

// ══════════════════════════════════════════
// EXCEL-WEIGHTED SIMULATOR CORE
// ══════════════════════════════════════════
function rollGacha() {
  const st = getSubState();

  if (currentBox === 'big') {
    const config = BIG_SUB_BOXES[currentSubBox.big];
    const limit = st.gotFirstRare ? BOXES.big.guarantee2 : BOXES.big.guarantee1;
    const isPity = st.pullsSinceRare >= (limit - 1);

    // Filter rare items
    const allRares = config.items.rare.map(r => r.name);
    const unobtainedRares = allRares.filter(name => !st.gotRares.includes(name));

    // Force Pity Condition
    if (isPity && unobtainedRares.length > 0) {
      const rolledName = unobtainedRares[Math.floor(Math.random() * unobtainedRares.length)];
      st.gotRares.push(rolledName);
      st.pullsSinceRare = 0;
      st.gotFirstRare = true;
      if (st.gotRares.length === allRares.length) st.gotAll = true;
      return { name: rolledName, rare: true, chance: 100, isPity: true, dup: false };
    }

    // Normal Random
    const r = Math.random();
    if (r < config.rareRate) {
      // Hit 5% Rare Pool
      st.gotFirstRare = true;
      const target = config.items.rare[Math.floor(Math.random() * config.items.rare.length)];
      let isDup = st.gotRares.includes(target.name);
      
      if (!isDup) {
        st.gotRares.push(target.name);
        st.pullsSinceRare = 0;
      } else {
        st.pullsSinceRare++; // Dup does not reset pity
      }
      if (st.gotRares.length === allRares.length) st.gotAll = true;
      return { name: target.name, rare: true, chance: target.c * 100, isPity: false, dup: isDup };
    } else {
      // Hit 95% Common Pool
      const target = config.items.common[Math.floor(Math.random() * config.items.common.length)];
      st.pullsSinceRare++;
      return { name: target.name, rare: false, chance: target.c * 100, isPity: false, dup: false };
    }
  }

  // 📦 ตู้สติกเกอร์ / ตู้หัวใจเล็ก (Weighted Box Pool)
  if (currentBox === 'graffiti' || currentBox === 'raindrop') {
    const config = BOXES[currentBox].subBoxes[currentSubBox[currentBox]];
    if (!st.pool || st.pool.length === 0) {
      st.pool = JSON.parse(JSON.stringify(config.items));
    }

    // Total weight remaining
    let totalW = st.pool.reduce((sum, item) => sum + item.weight, 0);
    let chosenItem = null;
    let chosenIdx = -1;

    // Last draw guarantee fallback
    if (st.pool.length === 1) {
      chosenItem = st.pool.splice(0, 1)[0];
      chosenIdx = 0;
    } else {
      let rng = Math.random() * totalW;
      let acc = 0;
      for (let i = 0; i < st.pool.length; i++) {
        acc += st.pool[i].weight;
        if (rng <= acc) {
          chosenIdx = i;
          chosenItem = st.pool.splice(i, 1)[0];
          break;
        }
      }
    }

    const calculatedChance = (chosenItem.weight / totalW) * 100;

    // Check if Special Box Cracked
    if (chosenItem.type === 'special') {
      const rest = st.pool.map(i => ({ name: i.name, rare: i.rare, chance: 100, instant: true }));
      st.pool = [];
      st.gotAll = true;
      return { name: chosenItem.name, rare: true, chance: calculatedChance, jackpot: true, rest: rest };
    }

    if (st.pool.length === 0) st.gotAll = true;
    return { name: chosenItem.name, rare: chosenItem.rare, chance: calculatedChance, jackpot: false };
  }
}

async function doPull(n) {
  const st = getSubState();
  if (st.gotAll) {
    showToast('คุณล้างตู้นี้ครบแล้ว! กรุณารีเซ็ตตู้หากต้องการทดสอบระบบดวงต่อครับ 🏆'); return;
  }

  document.getElementById('btn1').disabled = true;
  document.getElementById('btn10').disabled = true;

  let results = [];
  for (let i = 0; i < n; i++) {
    if (st.gotAll) break;
    // Charge cost
    st.totalCurrency += getCostForPull(currentBox, st.pulls + 1);
    st.pulls++;
    
    let res = rollGacha();
    results.push(res);
    st.history.push(res);
    
    // Check milestone refund bonuses for big box
    if (currentBox === 'big') {
      BOXES.big.bonuses.forEach((b, idx) => {
        if (st.pulls === b.atPull && !st.bonusEarned.includes(idx)) {
          st.bonusEarned.push(idx);
          st.history.push({ name: `🎁 โบนัสสะสมครบ ${b.atPull} ครั้ง`, chance: 100, bonus: true, amount: b.reward });
          showToast(`🎉 ระบบคืนตั๋วฟรีให้ +${b.reward} ใบจาก Milestone!`);
        }
      });
    }
  }
  saveState();

  // Handle single pull animation screen
  if (n === 1 && results.length === 1) {
    const res = results[0];
    const anim = document.getElementById('pull-anim');
    document.getElementById('anim-card').className = `anim-card ${res.rare?'rare':'common'}`;
    document.getElementById('anim-name').textContent = res.name;
    document.getElementById('anim-type').textContent = res.jackpot ? '✨ SPECIAL JACKPOT!' : res.rare ? '★ Rare Item' : 'Normal Item';
    document.getElementById('anim-chance').textContent = res.isPity ? '100% (Pity การันตี)' : `โอกาสดรอปจริงรอบนี้: ${res.chance.toFixed(2)}%`;
    
    const imgUrl = getImage(currentBox, res.name);
    const placeholder = document.getElementById('anim-img');
    if(imgUrl) {
      placeholder.outerHTML = `<img id="anim-img" src="${imgUrl}">`;
    } else {
      placeholder.outerHTML = `<div id="anim-img" class="anim-placeholder">${res.rare?'⭐':'📦'}</div>`;
    }

    document.getElementById('stage-empty').style.display = 'none';
    document.getElementById('card-grid').style.display = 'none';
    anim.classList.remove('hidden');
    await sleep(400);
    anim.classList.add('hidden');
  }

  renderResults(results);
  renderInfoBar();
  renderHistory();
  updateCostTags();

  document.getElementById('btn1').disabled = false;
  document.getElementById('btn10').disabled = false;
}

function renderResults(arr) {
  const grid = document.getElementById('card-grid');
  document.getElementById('stage-empty').style.display = 'none';
  grid.style.display = 'grid';

  let viewArr = [];
  arr.forEach(r => {
    viewArr.push(r);
    if (r.jackpot && r.rest) {
      r.rest.forEach(sub => viewArr.push(sub));
    }
  });

  grid.innerHTML = viewArr.map((r, idx) => {
    if (r.bonus) return '';
    const imgUrl = getImage(currentBox, r.name);
    const imgHtml = imgUrl ? `<img src="${imgUrl}" alt="${r.name}">` : `<div class="img-placeholder">${r.jackpot?'👑':r.rare?'⭐':'📦'}</div>`;
    const tag = currentBox==='big' ? (BIG_SUB_BOXES[currentSubBox.big].items.rare.find(i=>i.name===r.name)?.tag || '') : '';
    const cardClass = r.rare ? 'rare' : 'common';
    const borderStyle = r.jackpot ? 'border:2px solid var(--yellow);box-shadow:0 0 10px rgba(251,191,36,0.3);' : r.dup ? 'border:1.5px dashed var(--orange);opacity:0.85;' : '';

    return `<div class="item-card ${cardClass}" style="animation-delay:${idx*0.02}s; ${borderStyle}">
      ${r.jackpot ? '<span class="rare-star">JACKPOT</span>' : r.dup ? '<span class="rare-star" style="color:var(--orange)">ซ้ำ</span>' : tag ? `<span class="rare-star">${tag}</span>` : r.rare ? '<span class="rare-star">★</span>' : ''}
      ${imgHtml}
      <div class="iname">${r.name}</div>
      <div class="debug-chance">${r.instant ? 'Instantเหมาตู้' : r.isPity ? 'Pity 100%' : r.chance.toFixed(3)+'%'}</div>
    </div>`;
  }).join('');
}

function renderStageEmpty() {
  document.getElementById('stage-empty').style.display = 'flex';
  document.getElementById('card-grid').style.display = 'none';
  document.getElementById('card-grid').innerHTML = '';
}

function renderHistory() {
  const st = getSubState();
  const summary = document.querySelector('.history-bar summary');
  if (summary) summary.textContent = `📜 ประวัติการสุ่มภายในตู้นี้ (${st.history.length})`;
  
  document.getElementById('hist-row').innerHTML = st.history.slice().reverse().map(h => {
    if (h.bonus) {
      return `<div class="hist-item"><div class="hist-left"><span class="hist-pill bonus">BONUS</span><span>${h.name}</span></div><span class="hist-chance" style="color:var(--yellow)">+${h.amount} ใบ</span></div>`;
    }
    const cLabel = h.instant ? 'เหมาตู้แตก' : h.isPity ? '100% (Pity)' : `${h.chance.toFixed(3)}%`;
    const label = h.name + (h.dup ? ' (ซ้ำ ♻️)' : '');
    return `<div class="hist-item">
      <div class="hist-left">
        <span class="hist-pill ${h.rare?'rare':'common'}">${h.rare?'RARE':'COMMON'}</span>
        <span style="${h.dup?'color:var(--orange)':''}">${label}</span>
      </div>
      <span class="hist-chance">${cLabel}</span>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
// IMAGE MANAGEMENT STORAGE
// ══════════════════════════════════════════
let imgTab = 'big';
function switchImgTab(id, el) {
  imgTab = id;
  document.querySelectorAll('.img-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderImgList();
}
function getImage(boxId, itemName) {
  return ((images[boxId] || {})[currentSubBox[boxId]] || {})[itemName] || null;
}
function setImage(boxId, itemName, url) {
  const sub = currentSubBox[boxId];
  if (!images[boxId]) images[boxId] = {};
  if (!images[boxId][sub]) images[boxId][sub] = {};
  images[boxId][sub][itemName] = url;
  localStorage.setItem('gacha_images', JSON.stringify(images));
}
function renderImgList() {
  let list = [];
  if (imgTab === 'big') {
    const s = BIG_SUB_BOXES[currentSubBox.big];
    list = [...s.items.rare.map(i=>({name:i.name,rare:true})), ...s.items.common.map(i=>({name:i.name,rare:false}))];
  } else {
    list = BOXES[imgTab].subBoxes[currentSubBox[imgTab]].items.map(i=>({name:i.name,rare:i.rare}));
  }
  document.getElementById('img-list').innerHTML = list.map(item => {
    const url = getImage(imgTab, item.name) || '';
    const preview = url ? `<img src="${url}" style="width:40px;height:40px;object-fit:contain;border-radius:8px">` : `<div class="item-img-preview">${item.rare ? '⭐' : '📦'}</div>`;
    return `<div class="item-img-row">
      ${preview}<span class="item-img-name" style="color:${item.rare?'var(--accent2)':'var(--muted)'}">${item.name}</span>
      <input class="item-img-input" type="text" placeholder="URL รูปภาพ..." value="${url}" oninput="setImage('${imgTab}','${item.name}',this.value);renderImgList()">
    </div>`;
  }).join('');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('bonus-toast'); t.textContent = msg; t.classList.remove('hidden');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.add('hidden'), 3500);
}
function resetAll() {
  if (!confirm('ยืนยันที่จะรีเซ็ตประวัติและสถานะของตู้สุ่มย่อยนี้?')) return;
  state[currentBox][currentSubBox[currentBox]] = freshState()[currentBox][currentSubBox[currentBox]];
  saveState(); renderInfoBar(); renderHistory(); renderStageEmpty(); updateCostTags(); renderImgList();
}

// INIT RUN
renderSubBoxSel(); renderInfoBar(); renderHistory(); updateCostTags(); renderImgList();
