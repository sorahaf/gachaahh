<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fan Hearto Gacha Sim</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="bg-layer"></div>

<div class="wrap">

  <div class="nav">
    <a class="back" href="index.html">← <span data-i18n="navBack"></span></a>
    <div id="lang-switcher" style="display:inline-flex;gap:6px;margin-left:auto"></div>
    <h1 id="cabinet-title"></h1>
  </div>

  <!-- Banner -->
  <div id="banner-area" style="display:none">
    <img id="banner-img" src="" alt="">
    <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(90,40,10,.6),transparent 55%);border-radius:inherit"></div>
  </div>

  <!-- Sub-box selector -->
  <div class="selector-block">
    <div class="selector-title">🗂️ <span data-i18n="selectCabinet"></span></div>
    <div class="flex-buttons" id="sub-btns"></div>
  </div>

  <!-- Info bar -->
  <div class="info-bar" id="info-bar"></div>

  <!-- Pull buttons -->
  <div class="pull-area">
    <button class="pull-btn pull1"  id="btn1"  onclick="doPull(1)">
      <span data-i18n="pull1"></span>
      <span class="cost-tag" id="cost1"></span>
    </button>
    <button class="pull-btn pull10" id="btn10" onclick="doPull(10)">
      <span data-i18n="pull10"></span>
      <span class="cost-tag" id="cost10"></span>
    </button>
    <button class="pull-btn reset-pull" onclick="resetPool()"><span data-i18n="btnReset"></span></button>
    <button class="pull-btn compare-btn" onclick="openCompare()"><span data-i18n="btnCompare"></span></button>
  </div>

  <!-- Stage -->
  <div class="stage" id="stage">
    <div class="stage-empty" id="stage-empty"><span data-i18n="stagePlaceholder"></span></div>
    <div class="card-grid" id="card-grid" style="display:none"></div>
  </div>

  <!-- Debug -->
  <div class="debug-panel">
    <div class="debug-title">
      <span><span data-i18n="debugTitle"></span></span>
      <button class="btn-danger" onclick="resetAllState()"><span data-i18n="btnResetAll"></span></button>
    </div>
    <div class="debug-grid" id="debug-grid"></div>
  </div>

  <!-- History -->
  <details class="history-bar" open style="margin-top:.75rem">
    <summary><span data-i18n="historyTitle"></span></summary>
    <div class="hist-row" id="hist-row"></div>
  </details>

</div>

<script src="i18n.js"></script>
<script src="gacha-core.js"></script>
<script src="gacha-database.js"></script>
<script src="stats-modal.js"></script>
<script src="compare-modal.js"></script>
<script>
// ── Background จาก THEME_META ──
const params   = new URLSearchParams(location.search);
const themeKey = params.get('theme') || '';

(function() {
  const bgUrl = getThemeBg(themeKey);
  if (!bgUrl) return;
  const img = document.createElement('img'); img.className = 'bg-img'; img.src = bgUrl;
  document.getElementById('bg-layer').appendChild(img);
})();

// ── Deco bubbles ──
(function() {
  const colors = ['#ffd84a','#ff8fb2','#4db8f0','#b0e8a0','#ffc0a0'];
  for (let i = 0; i < 8; i++) {
    const b = document.createElement('div'); b.className = 'deco-bubble';
    const size = 18 + Math.random() * 35;
    b.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;background:${colors[i%colors.length]};opacity:.3;animation-duration:${5+Math.random()*6}s;animation-delay:-${Math.random()*6}s;`;
    document.body.appendChild(b);
  }
})();

// ── Init ──
const THEME_BOXES = Object.entries(GACHA_DATABASE)
  .filter(([,cfg]) => cfg.theme === themeKey)
  .map(([id,cfg]) => ({ id, ...cfg }));
if (!THEME_BOXES.length) { alert(t('cabinetNotFound')); location.href = 'index.html'; }

let activeId    = THEME_BOXES[0].id;
let globalState = loadGlobalState();

// ── Audio ──
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playSound(type) {
  const ctx = getAudio(), now = ctx.currentTime;
  if (type === 'deal') {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.type = 'triangle';
    o.frequency.setValueAtTime(200, now); o.frequency.exponentialRampToValueAtTime(60, now+.08);
    g.gain.setValueAtTime(.08,now); g.gain.linearRampToValueAtTime(.001,now+.08);
    o.start(now); o.stop(now+.08);
  } else if (type === 'reveal') {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.type = 'sine';
    o.frequency.setValueAtTime(440, now); o.frequency.exponentialRampToValueAtTime(560, now+.12);
    g.gain.setValueAtTime(.07,now); g.gain.linearRampToValueAtTime(.001,now+.12);
    o.start(now); o.stop(now+.12);
  } else if (type === 'rare') {
    [523,659,784,1047,1319,1568].forEach((freq,i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination); o.type = 'sine';
      const t = now + i*.05;
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(.055,t+.02);
      g.gain.exponentialRampToValueAtTime(.001, t+.8);
      o.start(now); o.stop(t+.8);
    });
  }
}

function spawnConfetti() {
  const colors = ['#ffd84a','#ff8fb2','#4db8f0','#ff8c38','#4ade80','#c8d8ff','#ffb06a'];
  for (let i = 0; i < 100; i++) {
    const p = document.createElement('div'); p.className = 'confetti';
    const size = 6 + Math.random()*7;
    p.style.cssText = `left:${Math.random()*100}vw;background:${colors[i%colors.length]};width:${size}px;height:${size+Math.random()*6}px;border-radius:${Math.random()>.5?'50%':'3px'};animation-delay:${Math.random()*.6}s;animation-duration:${2+Math.random()*1.5}s;`;
    document.body.appendChild(p); setTimeout(()=>p.remove(), 3800);
  }
}

function showToast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 3500);
}

// ── State ──
function getState(id = activeId) {
  if (!globalState[id]) globalState[id] = freshPoolState();
  return globalState[id];
}

// ── Render ──
function renderSubBtns() {
  document.getElementById('sub-btns').innerHTML = THEME_BOXES.map(b =>
    `<button class="sub-btn ${b.id===activeId?'active':''}" onclick="switchSub('${b.id}')">${b.label}</button>`
  ).join('');
}

function updateUI() {
  const cfg = GACHA_DATABASE[activeId];
  const st  = getState();

  document.getElementById('cabinet-title').textContent = `🕹️ ${cfg.theme}`;

  // banner จาก THEME_META
  const bannerUrl  = getThemeBanner(themeKey);
  const bannerArea = document.getElementById('banner-area');
  if (bannerUrl) {
    document.getElementById('banner-img').src = bannerUrl;
    bannerArea.style.display = 'block';
  } else {
    bannerArea.style.display = 'none';
  }

  // cost
  const maxDraws = cfg.costMap ? cfg.costMap.length : null;
  const isDone   = st.gotAll || (maxDraws && st.pulls >= maxDraws);
  document.getElementById('cost1').textContent = isDone ? t('cabinetCleared') : getNextCostDisplay(cfg, st.pulls);
  document.getElementById('btn1').disabled = isDone;

  const btn10 = document.getElementById('btn10');
  if (cfg.cabinetType === 'big') {
    btn10.style.display = '';
    document.getElementById('cost10').textContent =
      `${cfg.costPerPull*10} ${t('unitTicket')} (${cfg.costPerPull*10*cfg.heartMultiplier} 💜)`;
    btn10.disabled = isDone;
  } else { btn10.style.display = 'none'; }

  // chips
  const thb = calculateTHBCost(st.totalHeartsUsed);
  let chips = `
    <div class="info-chip"><div class="v">${st.pulls}</div><div class="l">${t('chipPulls')}</div></div>
    <div class="info-chip hearts"><div class="v">${cfg.cabinetType === 'heart_step' ? `💙 ${st.totalHeartsUsed.toLocaleString()}` : t('chipTickets', (st.totalHeartsUsed / cfg.heartMultiplier).toLocaleString())}</div><div class="l">${cfg.cabinetType === 'heart_step' ? t('chipHearts') : `(${st.totalHeartsUsed.toLocaleString()} 💜)`}</div></div>
    <div class="info-chip thb"><div class="v">฿${thb.toLocaleString()}</div><div class="l">${t('chipTHB')}</div></div>
  `;
  if (cfg.cabinetType === 'big') {
    const limit = st.gotFirstRare ? cfg.guarantee2 : cfg.guarantee1;
    const rem   = Math.max(0, limit - st.pullsSinceRare);
    const uR    = [...new Set(st.gotRares)].length;
    chips += `
      <div class="info-chip ${rem<=5?'warn':''}">
        <div class="v">${st.pullsSinceRare}<span style="font-size:.65rem;color:var(--text-muted)">/${limit}</span></div>
        <div class="l">${t('chipPity', st.pullsSinceRare, limit, rem)}</div>
      </div>
      <div class="info-chip good"><div class="v">${uR}/${cfg.items.rare.length}</div><div class="l">${t('chipRare')}</div></div>
    `;
  } else {
    const total = cfg.items.length;
    const left  = st.remainingIdx ? st.remainingIdx.length : total;
    chips += `
      <div class="info-chip good"><div class="v">${total-left}/${total}</div><div class="l">${t('chipObtained')}</div></div>
      <div class="info-chip ${left<=2?'warn':''}"><div class="v">${left}</div><div class="l">${t('chipRemaining')}</div></div>
    `;
  }
  if (st.gotAll) chips += `<div class="info-chip cleared"><div class="v">${t('chipCleared')}</div></div>`;
  document.getElementById('info-bar').innerHTML = chips;

  renderDebug(cfg, st);
  renderHistory(st);
}

function renderDebug(cfg, st) {
  let html;
  if (cfg.cabinetType === 'big') {
    html = `
      <div class="debug-box"><b>${t('debugEngine')}:</b> Pity Pool · ${cfg.name}</div>
      <div class="debug-box" style="border-left-color:var(--yellow-dk)"><b>${t('debugRareRate')}:</b> ${(cfg.rareRate*100).toFixed(1)}% (${cfg.items.rare.length} items)</div>
      <div class="debug-box" style="border-left-color:var(--blue)"><b>${t('debugCommonRate')}:</b> ${((1-cfg.rareRate)*100).toFixed(1)}% (${cfg.items.common.length} items)</div>
      <div class="debug-box" style="border-left-color:var(--pink)"><b>${t('debugGuaranteeLabel')}:</b> ${t('debugGuarantee', cfg.guarantee1, cfg.guarantee2)}</div>
    `;
  } else {
    const total = cfg.items.length, left = st.remainingIdx ? st.remainingIdx.length : total;
    const sp    = cfg.items.find(i => i.isSpecial);

    // ดึง avg rates จาก cache (คำนวณครั้งแรกครั้งเดียว)
    const rates = calcAvgRates(activeId, cfg);

    html = `
      <div class="debug-box"><b>${t('debugEngine')}:</b> Weight Step · ${cfg.name}</div>
      <div class="debug-box" style="border-left-color:var(--teal)"><b>${t('debugItemsLeft')}:</b> ${left} / ${total}</div>
      <div class="debug-box" style="border-left-color:var(--pink)"><b>${t('debugSpecialAvg')}:</b> ${rates.special}% (${sp?.name||'-'})</div>
      <div class="debug-box" style="border-left-color:var(--yellow-dk)"><b>${t('debugRareAvg')}:</b> ${rates.rare}% · ${t('debugNormalAvg')}: ${rates.normal}%</div>
      <div class="debug-box" style="border-left-color:var(--blue)"><b>${t('debugTotalCost')}:</b> ${cfg.cabinetType==='heart_step' ? `${cfg.costMap.reduce((a,b)=>a+b,0)} 💜` : `${cfg.costMap.reduce((a,b)=>a+b,0)} ${t('unitTicket')} (${cfg.costMap.reduce((a,b)=>a+b,0) * cfg.heartMultiplier} 💜)`}</div>
    `;
  }
  document.getElementById('debug-grid').innerHTML = html;
}

function renderHistory(st) {
  const s = document.querySelector('.history-bar summary');
  if (s) s.textContent = `${t('historyTitle')} (${st.history.length})`;
  document.getElementById('hist-row').innerHTML = st.history.slice().reverse().map(h => {
    const pc = h.isSpecial?'special':h.isRare?'rare':h.isRebate?'rebate':'normal';
    const pl = h.isSpecial?'SPECIAL':h.isRare?'RARE':h.isRebate?'REBATE':'NORMAL';
    const nm = h.dup ? `<span style="color:var(--orange)">${h.name} ♻️</span>` : h.name;
    const tag = h.isPity   ? `<span style="color:var(--blue-dk);font-size:.7rem;font-weight:700">Pity ✓</span>` :
                h.isRebate ? `<span style="color:var(--green-dk);font-size:.72rem;font-weight:700">+${h.tickets} ${t('unitTicket')}</span>` : '';
    return `<div class="hist-item"><span><span class="hist-pill ${pc}">${pl}</span>${nm}</span>${tag}</div>`;
  }).join('');
}

// ── Actions ──
function switchSub(id) {
  activeId = id; clearStage(); renderSubBtns(); updateUI();
  // pre-warm cache ของตู้นี้ใน background ถ้ายังไม่มี
  const cfg = GACHA_DATABASE[activeId];
  if (cfg.cabinetType !== 'big') setTimeout(() => calcAvgRates(activeId, cfg), 50);
}
function clearStage() {
  document.getElementById('stage-empty').style.display = 'flex';
  document.getElementById('card-grid').style.display   = 'none';
  document.getElementById('card-grid').innerHTML        = '';
}

function doPull(n) {
  const cfg = GACHA_DATABASE[activeId], st = getState();
  if (st.gotAll) { showToast(t('toastCleared')); return; }
  document.getElementById('btn1').disabled = document.getElementById('btn10').disabled = true;

  const results = []; let hasLucky = false;
  if (cfg.cabinetType === 'big') {
    for (let i = 0; i < n; i++) {
      if (st.gotAll) break;
      st.totalHeartsUsed += cfg.costPerPull * cfg.heartMultiplier; st.pulls++;
      const res = doSingleRoll(cfg, st);
      results.push(res); st.history.push(res);
      if (res.isRare || res.isSpecial) hasLucky = true;
      const rb = checkRebate(st);
      if (rb) {
        st.history.push({ name: t('rebateLabel', rb.target, rb.tickets), isRebate:true, tickets:rb.tickets });
        showToast(t('toastRebate', rb.tickets, rb.heartsSaved));
      }
    }
  } else {
    if (st.pulls >= cfg.costMap.length) return;
    st.totalHeartsUsed += cfg.costMap[st.pulls] * cfg.heartMultiplier; st.pulls++;
    const res = doSingleRoll(cfg, st);
    if (res.swept?.length) {
      results.push(res); res.swept.forEach(s => results.push(s));
      st.history.push({ name:`${res.name} + swept ${res.swept.length} items`, isSpecial:true });
      hasLucky = true;
    } else {
      results.push(res); st.history.push(res);
      if (res.isRare || res.isSpecial) hasLucky = true;
    }
  }
  saveGlobalState(globalState);

  // ── trigger stats modal หลังล้างตู้ ──
  const _justCleared = getState().gotAll && !globalState[activeId]._statsShown;
  if (_justCleared) globalState[activeId]._statsShown = true;

  const grid = document.getElementById('card-grid');
  document.getElementById('stage-empty').style.display = 'none';
  grid.style.display = 'grid'; grid.innerHTML = '';

  const visible = results.filter(r => !r.isRebate);
  visible.forEach((r, i) => {
    const cls       = r.isSpecial ? 'special' : r.isRare ? 'rare' : '';
    const isRainbow = r.isSpecial || r.tag === '🌈';
    const badge     = r.isPity ? 'Pity ✓' : r.isSpecial ? '✨ JACKPOT' : r.isRare ? '★ Rare' : 'Normal';
    const imgPath   = getItemImgPath(r.name);
    // dup-badge ซ่อนไว้ก่อน จะค่อย fade in ทีหลัง
    const dupHtml   = r.dup
      ? `<div class="dup-badge dup-pending" style="opacity:0;transition:opacity .4s">♻️ Dup</div>`
      : '';
    grid.insertAdjacentHTML('beforeend', `
      <div class="gacha-card-holder ${isRainbow ? 'is-rainbow' : ''}" style="animation-delay:${i*.08}s" data-dup="${r.dup ? '1' : '0'}">
        <div class="item-card ${cls}">
          <span class="badge">${badge}</span>
          <div class="item-img-wrap">
            <img src="${imgPath}" alt="${r.name}"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="item-img-fallback" style="display:none">
              ${r.isSpecial ? '✨' : r.isRare ? '⭐' : '🎁'}
            </div>
          </div>
          <div class="card-name">${r.name}</div>
          ${dupHtml}
        </div>
      </div>
    `);
    setTimeout(() => playSound('deal'), i * 80);
  });

  setTimeout(() => {
    document.querySelectorAll('.gacha-card-holder').forEach(c => c.classList.add('is-revealed'));
    if (hasLucky) { playSound('rare'); spawnConfetti(); } else playSound('reveal');
    updateUI();

    // หลังเห็นรูป 1.2s → ค่อย reveal dup badge + เปลี่ยนรูปเป็น 🎫
    setTimeout(() => {
      document.querySelectorAll('.gacha-card-holder[data-dup="1"]').forEach(holder => {
        const badge = holder.querySelector('.dup-pending');
        if (badge) badge.style.opacity = '1';

        const imgWrap = holder.querySelector('.item-img-wrap');
        if (imgWrap) {
          imgWrap.style.transition = 'opacity .35s';
          imgWrap.style.opacity = '0';
          setTimeout(() => {
            imgWrap.innerHTML = `<div class="item-img-fallback" style="display:flex;font-size:2rem">🎫</div>`;
            imgWrap.style.opacity = '1';
          }, 350);
        }
      });
    }, 1200);

    // แสดง stats modal หลังล้างตู้
    if (_justCleared) {
      setTimeout(() => showStatsModal(GACHA_DATABASE[activeId], getState().pulls), 900);
    }
    document.getElementById('btn1').disabled = document.getElementById('btn10').disabled = false;
  }, visible.length * 80 + 260);
}

// ── helper: สร้าง path รูปไอเทม ──
function getItemImgPath(name) {
  // encode space → %20 เพื่อให้ GitHub Pages โหลดได้
  return `images/items/${name.replace(/ /g, '%20')}.jpg`;
}

function openCompare() {
  showCompareModal(GACHA_DATABASE[activeId], 500);
}

function resetPool() {
  if (!confirm(t('confirmReset'))) return;
  delete globalState[activeId]; saveGlobalState(globalState); clearStage(); updateUI();
}
function resetAllState() {
  if (!confirm(t('confirmResetAll'))) return;
  globalState = {}; saveGlobalState(globalState); clearStage(); updateUI();
}

renderSubBtns();
updateUI();
applyI18n();
renderLangSwitc
