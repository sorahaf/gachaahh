<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 Gacha Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;--surface:#151820;--surface2:#1c2030;--border:#2a3045;
  --accent:#7c6af7;--accent2:#f7a26a;--green:#4ade80;--yellow:#fbbf24;
  --teal:#2dd4bf;--text:#e8eaf0;--muted:#7a839a;
  --font-th:'Noto Sans Thai',sans-serif;--font-mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-th);min-height:100vh;
  display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(700px at 20% 30%,rgba(124,106,247,.06),transparent 60%),
             radial-gradient(500px at 80% 70%,rgba(247,162,106,.05),transparent 60%),
             radial-gradient(400px at 50% 90%,rgba(45,212,191,.03),transparent 60%)}

.wrap{position:relative;z-index:1;max-width:520px;width:100%;padding:2rem 1rem 3rem;text-align:center}

header{margin-bottom:2.5rem}
.logo{font-size:3rem;margin-bottom:.75rem;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
h1{font-family:var(--font-mono);font-size:clamp(1.5rem,5vw,2rem);font-weight:700;
  color:var(--accent);letter-spacing:-.02em;margin-bottom:.4rem}
h1 span{color:var(--accent2)}
.subtitle{color:var(--muted);font-size:.9rem}

.cards{display:flex;flex-direction:column;gap:.85rem;margin-bottom:2rem}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:1.4rem 1.5rem;text-align:left;text-decoration:none;color:var(--text);
  display:flex;align-items:center;gap:1.1rem;
  transition:border-color .2s, transform .15s, background .2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s}
.card:hover{transform:translateY(-2px)}
.card:hover::before{opacity:1}
.card:active{transform:scale(.99)}

.card.budget::before{background:linear-gradient(135deg,rgba(247,162,106,.06),rgba(251,191,36,.04))}
.card.budget:hover{border-color:var(--accent2)}
.card.sim::before{background:linear-gradient(135deg,rgba(124,106,247,.06),rgba(45,212,191,.04))}
.card.sim:hover{border-color:var(--accent)}
.card.value::before{background:linear-gradient(135deg,rgba(74,222,128,.05),rgba(96,165,250,.04))}
.card.value:hover{border-color:var(--green)}

.card-ico{font-size:2.2rem;flex-shrink:0;position:relative;z-index:1}
.card-body{position:relative;z-index:1}
.card-title{font-size:1rem;font-weight:600;margin-bottom:.25rem}
.card-desc{font-size:.8rem;color:var(--muted);line-height:1.5}
.card-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.68rem;
  font-family:var(--font-mono);margin-top:.4rem}
.tag-orange{background:rgba(247,162,106,.15);color:var(--accent2)}
.tag-purple{background:rgba(124,106,247,.15);color:var(--accent)}
.tag-green{background:rgba(74,222,128,.15);color:var(--green)}

.arrow{margin-left:auto;color:var(--muted);font-size:1.1rem;flex-shrink:0;position:relative;z-index:1;
  transition:transform .2s, color .2s}
.card:hover .arrow{transform:translateX(4px);color:var(--text)}

footer{color:var(--muted);font-size:.75rem}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">🎰</div>
    <h1>Gacha <span>Hub</span></h1>
    <p class="subtitle">เครื่องมือวางแผนกาชา — อัปเดตได้ตามแพทช์</p>
  </header>

  <div class="cards">
    <!--
    <a class="card budget" href="budget.html">
      <span class="card-ico">💰</span>
      <div class="card-body">
        <div class="card-title">Budget Planner</div>
        <div class="card-desc">กรอกงบ → เห็นทันทีว่าเปิดได้กี่ครั้ง โอกาสได้รุ้ง/ทอง/ของใหญ่เท่าไหร่ ทุกตู้</div>
        <span class="card-tag tag-orange">ตู้ใหญ่ · กราฟฟิตี้ · เรนดรอป</span>
      </div>
      <span class="arrow">→</span>
    </a>
        -->

    <a class="card sim" href="simulator.html">
      <span class="card-ico">🎲</span>
      <div class="card-body">
        <div class="card-title">Gacha Simulator</div>
        <div class="card-desc">ทดลองสุ่มแบบ pull 1 ครั้ง (มี animation) หรือ 10 ครั้งพร้อมกัน มีระบบปิตี้และโบนัสครบ</div>
        <span class="card-tag tag-purple">Pull 1 · Pull 10 · Pity Counter</span>
      </div>
      <span class="arrow">→</span>
    </a>

<!--
    <a class="card value" href="value.html">
      <span class="card-ico">📊</span>
      <div class="card-body">
        <div class="card-title">Value Calculator</div>
        <div class="card-desc">กราฟและตารางความคุ้มค่าแบบละเอียด เปรียบเทียบราคาต่อชิ้นทุกตู้</div>
        <span class="card-tag tag-green">กราฟ · ตาราง · เปรียบเทียบ</span>
      </div>
      <span class="arrow">→</span>
    </a>
-->
  </div>

  <footer>
    <p>ข้อมูล patch 2025.11.28 · <a href="#" onclick="navigator.clipboard.writeText(location.href);return false">📋 copy ลิงก์</a></p>
  </footer>
</div>
</body>
</html>
